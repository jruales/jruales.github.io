<!doctype html>
<html class="no-js" lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Joaquín Ruales</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="apple-touch-icon" href="apple-touch-icon.png">
        <!-- Place favicon.ico in the root directory -->

        <link rel="stylesheet" href="css/normalize.css">
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href='http://fonts.googleapis.com/css?family=Oswald:400,700,300' rel='stylesheet' type='text/css'>
        <link href="http://fonts.googleapis.com/css?family=Roboto:400,300,500" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/webicons.css">

        <script src="js/vendor/modernizr-2.8.3.min.js"></script>
    </head>
    <body>
        <!--[if lt IE 8]>
            <p class="browserupgrade">You are using an <strong>outdated</strong> browser. Please <a href="http://browsehappy.com/">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <div id="main">
<script id="page-template" type="text/x-handlebars-template">

            {{!-- Add your site or application content here --}}
            <header>
                <div class="container" id="basics">
                    <img src="img/basics/{{basics.picture}}" style="float:left" id="picture"/>
                    <div id="name-label-email-links" style="float:left">
                        <div id="name"><h1>{{basics.name}}</h1></div>
                        <div id="label">{{basics.label}}</div>
                        <div id="email">{{basics.email}}</div>
                        <div>
                            <a class="webicon googleplus" href="https://plus.google.com/u/0/108677809195090402050/posts">Google+</a>
                            <a class="webicon twitter" href="https://twitter.com/JoaquinARuales">Twitter</a>
                            <a class="webicon flickr" href="https://www.flickr.com/photos/46440167@N02">Flickr</a>
                            <a class="webicon youtube" href="https://www.youtube.com/channel/UCSejsjO0ark_Xy3UEh2dDCg">YouTube</a>
                            <a class="webicon linkedin" href="https://www.linkedin.com/in/jruales">LinkedIn</a>
                            <a class="webicon github" href="https://github.com/jruales">Github</a>
                        </div>
                    </div>
                </div>
                <div style="clear:both"></div>
            </header>
            <div class="container">
                <div class="row">
                    <div class="col-md-8">
                        <div id="summary" class="">
                            <!--h2>Hi,</h2-->
                            <div style="height:20px"></div>
                            {{{basics.summary}}}
                        </div>
                    </div>
                </div>
                <div style="margin-top:40px;" class="row">
                    <div class="col-md-12">
                        <div id="time-events" class="">
                            <!--h2>Timeline</h2-->
                            <ul>
                            {{#each timeEvents as |timeEvent timeEventId|}}
                                <li class="time-event">
                                    <div class="timeframe">{{timeEvent.timeframe}}</div>
                                    <div class="title">{{timeEvent.title}}</div>
                                    {{#if timeEvent.description}}
                                        <div class="description">{{timeEvent.description}}</div>
                                    {{/if}}
                                </li>
                            {{/each}}
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-9">
                        <div id="petProjects" class="">
                            <h2>Pet Projects</h2>
                            {{#each petProjects as |petProject petProjectId|}}
                                {{#if petProject.link}}
                                    <h3><a target="_blank" href="{{petProject.link}}">{{petProject.title}}</a></h3>
                                {{else}}
                                    <h3>{{petProject.title}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if petProject.image}}
                                        {{#if petProject.link}}
                                        <a target="_blank" href="{{petProject.link}}">
                                            <img src="img/pet_projects/{{petProject.image}}" style="max-width:150px" />
                                        </a>
                                        {{else}}
                                        <img src="img/pet_projects/{{petProject.image}}" style="max-width:150px" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" style="max-width:150px" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>{{petProject.description}}</div>
                                        <div>Uses {{petProject.technologies}}</div>
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="builtWebsites" class="">
                            <h2>Other Websites</h2>
                            {{#each builtWebsites as |builtWebsite builtWebsiteId|}}
                                {{#if builtWebsite.link}}
                                    <h3><a target="_blank" href="{{builtWebsite.link}}">{{builtWebsite.title}}</a></h3>
                                {{else}}
                                    <h3>{{builtWebsite.title}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if builtWebsite.image}}
                                        {{#if builtWebsite.link}}
                                        <a target="_blank" href="{{builtWebsite.link}}">
                                            <img src="img/websites/{{builtWebsite.image}}" style="max-width:150px" />
                                        </a>
                                        {{else}}
                                        <img src="img/websites/{{builtWebsite.image}}" style="max-width:150px" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" style="max-width:150px" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>{{{builtWebsite.description}}}</div>
                                        {{#if builtWebsite.technologies}}
                                        <div>Uses {{builtWebsite.technologies}}</div>
                                        {{/if}}
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="contests" class="">
                            <h2>Programming Contests</h2>
                            {{#each contests as |contest contestId|}}
                                {{#if contest.link}}
                                    <h3><a target="_blank" href="{{contest.link}}">{{contest.honor}}, {{contest.name}}</a></h3>
                                {{else}}
                                    <h3>{{contest.honor}}, {{contest.name}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                        {{#if contest.image}}
                                            {{#if contest.link}}
                                            <a target="_blank" href="{{contest.link}}">
                                                <img src="img/contests/{{contest.image}}" style="max-width:150px" />
                                            </a>
                                            {{else}}
                                            <img src="img/contests/{{contest.image}}" style="max-width:150px" />
                                            {{/if}}
                                        {{else}}
                                            <img src="img/placeholder/square.png" style="max-width:150px" />
                                        {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>{{contest.venue}}. {{contest.location}}.</div>
                                        <div>{{contest.description}}</div>
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="programmingExperiments" class="">
                            <h2>Web Programming Experiments</h2>
                            {{#each programmingExperiments as |programmingExperiment programmingExperimentId|}}
                                <h3><a href="{{programmingExperiment.link}}" target="_blank">{{programmingExperiment.name}} ({{programmingExperiment.dateYear}})</a></h3>
                                <div class="row">
                                    <div class="col-md-3">
                                        {{#if programmingExperiment.image}}
                                            {{#if programmingExperiment.link}}
                                            <a href="{{programmingExperiment.link}}" target="_blank"><img src="img/programming_experiments/{{programmingExperiment.image}}" style="max-width:150px" /></a>
                                            {{else}}
                                            <img src="img/programming_experiments/{{programmingExperiment.image}}" style="max-width:150px" />
                                            {{/if}}
                                        {{else}}
                                            <img src="img/placeholder/square.png" style="max-width:150px" />
                                        {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>{{{programmingExperiment.description}}}</div>
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="preprints" class="">
                            <h2>Publication Preprints</h2>
                            {{#each preprints as |preprint preprintId|}}
                                <h3><a target="_blank" href="{{preprint.link}}">{{preprint.title}}</a></h3>
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if preprint.image}}
                                        {{#if preprint.link}}
                                        <a target="_blank" href="{{preprint.link}}"><img src="img/preprints/{{preprint.image}}" style="max-width:150px" /></a>
                                        {{else}}
                                        <img src="img/preprints/{{preprint.image}}" style="max-width:150px" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" style="max-width:150px" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>Authors: {{preprint.authors}}</div>
                                        <div>Abstract: {{preprint.abstract}}</div>
                                    </div>
                            {{/each}}
                        </div>
                        <div id="degrees" class="">
                            <h2>Coursework</h2>
                            <div>
                                <ul>
                                {{#each degrees as |degree degreeId|}}
                                    <li>
                                        <strong>{{degree.collegeName}} {{degree.title}}{{#if degree.major}} in {{degree.major}}{{/if}}</strong>
                                        <ul>
                                        {{#each degree.relevantCourses as |relevantCourse relevantCourseId|}}
                                        <li>
                                         {{relevantCourse.name}} ({{relevantCourse.departmentCode}} {{relevantCourse.number}})
                                        </li>
                                        {{/each}}
                                        {{#each degree.otherCourses as |otherCourse otherCourseId|}}
                                        <li>
                                         {{otherCourse.name}} ({{otherCourse.departmentCode}} {{otherCourse.number}})
                                        </li>
                                        {{/each}}
                                        </ul>
                                    </li>
                                {{/each}}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            

        

</script> <!-- page-template -->
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
        <script>window.jQuery || document.write('<script src="js/vendor/jquery-1.11.3.min.js"><\/script>')</script>
        <script src="js/vendor/jquery-ui.min.js"></script>
        <script src="js/vendor/handlebars-v3.0.3.js"></script>
        <script src="js/plugins.js"></script>
        <script src="js/vendor/bootstrap.min.js"></script>

        <script src="js/vendor/three.min.js"></script>
        <script src="js/vendor/threejs/renderers/Projector.js"></script>
        <script src="js/vendor/threejs/renderers/CanvasRenderer.js"></script>
        <script src="js/vendor/threejs/libs/stats.min.js"></script>

        <script src="js/data/data.js"></script>
        <script src="js/main.js"></script>
        
        <!-- Google Analytics: change UA-XXXXX-X to be your site's ID. -->
        <script>
            (function(b,o,i,l,e,r){b.GoogleAnalyticsObject=l;b[l]||(b[l]=
            function(){(b[l].q=b[l].q||[]).push(arguments)});b[l].l=+new Date;
            e=o.createElement(i);r=o.getElementsByTagName(i)[0];
            e.src='https://www.google-analytics.com/analytics.js';
            r.parentNode.insertBefore(e,r)}(window,document,'script','ga'));
            ga('create','UA-XXXXX-X','auto');ga('send','pageview');
        </script>
    </body>
</html>
