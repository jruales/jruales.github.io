<!doctype html>
<html class="no-js" lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Joaquín Ruales</title>
        <meta name="description" content="Hi, I'm a software engineer and mathematician interested in machine learning, computer graphics, web application development, and applied mathematics.">
        <!--meta name="viewport" content="width=device-width, initial-scale=1"-->
        <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">


        <link rel="apple-touch-icon" href="apple-touch-icon.png">

        <link rel="stylesheet" href="css/normalize.css">
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href='http://fonts.googleapis.com/css?family=Oswald:400,700,300' rel='stylesheet' type='text/css'>
        <link href="http://fonts.googleapis.com/css?family=Roboto:400,300,500" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/webicons.css">
        <link type="text/css" rel="stylesheet" href="css/jquery.mmenu.css" />
        <link type="text/css" rel="stylesheet" href="css/addons/jquery.mmenu.dragopen.css" />

        <!--[if lt IE 8]>

    <div>
        <div id="main">
<script id="page-template" type="text/x-handlebars-template">
            <!--div class="header Fixed" style="height:50px; background-color:#fff; box-shadow: 0px 1px 10px #000; font-size:2em;">
                <a href="#menu">🍔☰</a>
            </div-->
            <div class="header Fixed">
                <a href="#menu"></a>
                <!--Joaquín Ruales-->
            </div>
            {{!-- Add your site or application content here --}}
            <div id="actual-header" style="margin-top:0">
                <div class="container" id="basics">
                    <img src="img/basics/{{basics.picture}}" style="float:left" id="picture"/>
                    <div id="name-label-email-links" style="float:left">
                        <div id="name"><h1>{{basics.name}}</h1></div>
                        <div id="label">{{basics.label}}</div>
                        <div id="email">{{basics.email}}</div>
                        <div>
                        {{#each basics.profiles as |profile profileId|}}
                            <a target="_blank" class="webicon {{profile.iconClass}}" href="{{profile.link}}">{{profile.name}}</a>&nbsp;
                        {{/each}}
                        </div>
                    </div>
                </div>
                <div style="clear:both"></div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-md-8">
                        <div id="summary" class="">
                            <!--h2>Hi,</h2-->
                            <div style="height:20px"></div>
                            {{{basics.summary}}}
                        </div>
                    </div>
                </div>
                <div style="margin-top:40px;" class="row">
                    <div class="col-md-12">
                        <div id="time-events" class="">
                            <!--h2>Timeline</h2-->
                            <ul>
                            {{#each timeEvents as |timeEvent timeEventId|}}
                                <li class="time-event">
                                    <div class="timeframe">{{timeEvent.timeframe}}</div>
                                    <div class="title">{{{timeEvent.title}}}</div>
                                    {{#if timeEvent.description}}
                                        <div class="description">{{{timeEvent.description}}}</div>
                                    {{/if}}
                                </li>
                            {{/each}}
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-9">
                        <div id="contests" class="">
                            <h2>🏆 Programming Contests</h2>
                            {{#each contests as |contest contestId|}}
                                {{#if contest.link}}
                                    <h3><a target="_blank" href="{{contest.link}}">{{contest.honor}}, {{contest.name}}</a></h3>
                                {{else}}
                                    <h3>{{contest.honor}}, {{contest.name}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                        {{#if contest.image}}
                                            {{#if contest.link}}
                                            <a target="_blank" href="{{contest.link}}">
                                                <img src="img/contests/{{contest.image}}" />
                                            </a>
                                            {{else}}
                                            <img src="img/contests/{{contest.image}}" />
                                            {{/if}}
                                        {{else}}
                                            <img src="img/placeholder/square.png" />
                                        {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div><em>{{contest.dateYear}}.</em></div>
                                        <div><em>{{contest.venue}}. {{contest.location}}.</em></div>
                                        <div>{{contest.description}}</div>
                                        {{#each contest.links as |link linkId|}}
                                        <a class="no-hover-underline" target="_blank" href="{{link.url}}">
                                            <button type="button" class="btn btn-default" aria-label="{{link.name}}">
                                              {{link.name}}
                                            </button>
                                        </a>
                                        {{/each}}
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="petProjects" class="">
                            <h2>💡 Pet Projects</h2>
                            {{#each petProjects as |petProject petProjectId|}}
                                <h3>{{petProject.title}}</h3>
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if petProject.image}}
                                        {{#if petProject.link}}
                                        <a target="_blank" href="{{petProject.link}}">
                                            <img src="img/pet_projects/{{petProject.image}}" />
                                        </a>
                                        {{else}}
                                        <img src="img/pet_projects/{{petProject.image}}" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div><em>{{petProject.dateYear}}.</em></div>
                                        <div>{{petProject.description}}</div>
                                        <div>Uses {{petProject.technologies}}</div>
                                        {{#each petProject.links as |link linkId|}}
                                        <a class="no-hover-underline" target="_blank" href="{{link.url}}">
                                            <button type="button" class="btn btn-default" aria-label="{{link.name}}">
                                              {{link.name}}
                                            </button>
                                        </a>
                                        {{/each}}
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="builtWebsites" class="">
                            <h2>💻 Other Websites</h2>
                            {{#each builtWebsites as |builtWebsite builtWebsiteId|}}
                                {{#if builtWebsite.link}}
                                    <h3><a target="_blank" href="{{builtWebsite.link}}">{{builtWebsite.title}}</a></h3>
                                {{else}}
                                    <h3>{{builtWebsite.title}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if builtWebsite.image}}
                                        {{#if builtWebsite.link}}
                                        <a target="_blank" href="{{builtWebsite.link}}">
                                            <img src="img/websites/{{builtWebsite.image}}" />
                                        </a>
                                        {{else}}
                                        <img src="img/websites/{{builtWebsite.image}}" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div><em>{{builtWebsite.dateYear}}.</em></div>
                                        <div>{{{builtWebsite.description}}}</div>
                                        {{#if builtWebsite.technologies}}
                                        <div>Uses {{builtWebsite.technologies}}</div>
                                        {{/if}}
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="programmingExperiments" class="">
                            <h2>👾 Other Projects and Experiments</h2>
                            {{#each programmingExperiments as |programmingExperiment programmingExperimentId|}}
                                <h3><a href="{{programmingExperiment.link}}" target="_blank">{{programmingExperiment.name}}</a></h3>
                                <div class="row">
                                    <div class="col-md-3">
                                        {{#if programmingExperiment.image}}
                                            {{#if programmingExperiment.link}}
                                            <a href="{{programmingExperiment.link}}" target="_blank"><img src="img/programming_experiments/{{programmingExperiment.image}}" /></a>
                                            {{else}}
                                            <img src="img/programming_experiments/{{programmingExperiment.image}}" />
                                            {{/if}}
                                        {{else}}
                                            <img src="img/placeholder/square.png" />
                                        {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div><em>{{programmingExperiment.dateYear}}.</em></div>
                                        <div>{{{programmingExperiment.description}}}</div>
                                    </div>
                                </div>
                            {{/each}}
                        </div>
                        <div id="preprints" class="">
                            <h2>📃 Publication Preprints</h2>
                            {{#each preprints as |preprint preprintId|}}
                                {{#if preprint.link}}
                                <h3><a target="_blank" href="{{preprint.link}}">{{preprint.title}}</a></h3>
                                {{else}}
                                <h3>{{preprint.title}}</h3>
                                {{/if}}
                                <div class="row">
                                    <div class="col-md-3">
                                    {{#if preprint.image}}
                                        {{#if preprint.link}}
                                        <a target="_blank" href="{{preprint.link}}"><img src="img/preprints/{{preprint.image}}" /></a>
                                        {{else}}
                                        <img src="img/preprints/{{preprint.image}}" />
                                        {{/if}}
                                    {{else}}
                                        <img src="img/placeholder/square.png" />
                                    {{/if}}
                                    </div>
                                    <div class="col-md-9">
                                        <div>{{{preprint.notes}}}</div>
                                        <div><strong>Authors:</strong> {{preprint.authors}}</div>
                                        <div><strong>Abstract:</strong> {{preprint.abstract}}</div>
                                        {{#each preprint.links as |link linkId|}}
                                        <a class="no-hover-underline" target="_blank" href="{{link.url}}">
                                            <button type="button" class="btn btn-default" aria-label="{{link.name}}">
                                              {{link.name}}
                                            </button>
                                        </a>
                                        {{/each}}
                                    </div>
                            {{/each}}
                        </div><!--#preprints-->
                        <div id="coursework" class="">
                            <h2>📚 Coursework</h2>
                            <div>
                                <ul>
                                {{#each degrees as |degree degreeId|}}
                                    <li>
                                        <strong>{{degree.collegeName}} {{degree.title}}{{#if degree.major}} in {{degree.major}}{{/if}}{{#if degree.gpa}} (GPA {{degree.gpa}}){{/if}}</strong>
                                        <ul>
                                        {{#each degree.relevantCourses as |relevantCourse relevantCourseId|}}
                                        <li>
                                         {{relevantCourse.name}} ({{relevantCourse.departmentCode}} {{relevantCourse.number}})
                                        </li>
                                        {{/each}}
                                        {{#each degree.otherCourses as |otherCourse otherCourseId|}}
                                        <li>
                                         {{otherCourse.name}} ({{otherCourse.departmentCode}} {{otherCourse.number}})
                                        </li>
                                        {{/each}}
                                        </ul>
                                    </li>
                                {{/each}}
                                </ul>
                            </div>
                        </div><!--#degrees-->
                        <div id="misc" class="">
                            <h2>🎁 Misc.</h2>
                            <div>
                                <ul>
                                    <li>
                                        <strong>Programming Languages:</strong>
                                        <ul>
                                            <li>Java</li>
                                            <li>C++ (incl. Eigen)</li>
                                            <li>Python (incl. NumPy, SciPy, Theano)</li>
                                            <li>MATLAB</li>
                                            <li>JavaScript (incl. jQuery, Angular, Underscore.js, Math.js, Numeric.js)</li>
                                            <li>ActionScript 3.0</li>
                                            <li>PHP (incl. Laravel)</li>
                                            <li>SQL</li>
                                        </ul>
                                    </li>
                                    <li>
                                        <strong>Tools:</strong>
                                        <ul>
                                            <li>Eclipse</li>
                                            <li>Sublime Text 3</li>
                                            <li>Git</li>
                                            <li><img src="img/LaTeX_logo.svg" class="latex-logo"/></li>
                                            <li>/\b(?:Regular Expressions|RegExp?)\b/</li>
                                            <li>
                                                Adobe Creative Suite:
                                                <ul>
                                                    <li>Ps</li>
                                                    <li>Fl</li>
                                                </ul>
                                            </li>
                                        </ul>
                                    </li>
                                    <li>
                                        <strong>Teaching Experience:</strong>
                                        <ul>
                                            <li>Teaching Assistant (held office hours, graded assignments and exams) for:
                                                <ul>
                                                    <li>Computational Aspects of Robotics (COMS 4733)<br/>Fall 2015 and Fall 2014, Columbia University</li>
                                                    <li>Parallel Programming (COMS 4130)<br/>Fall 2013, Columbia University</li>
                                                </ul>
                                            </li>
                                            <li>I was a one-on-one tutor in Math and Computer Science while at Columbia University and Oberlin College.</li>
                                            <li>In High School, I coached a group of four students for an interscholastic Math competition and taught an extracurricular class on ActionScript programming.</li>
                                        </ul>
                                    </li>
                                    <li>
                                        <strong>Human Languages:</strong>
                                        <ul>
                                            <li>English - Fluent</li>
                                            <li>Spanish - Fluent</li>
                                            <li>Italian - Intermediate</li>
                                            <li>English Braille - Embossing, typing, and visually reading uncontracted Braille</li>
                                        </ul>
                                    </li>
                                    <li>
                                        <strong>Standardized Test Scores:</strong>
                                        <ul>
                                            <li>GRE
                                                <ul>
                                                    <li>V166&#47;170 (96th percentile), Q170&#47;170 (98th percentile)</li>
                                                </ul>
                                            </li>
                                            <li>SAT
                                                <ul>
                                                    <li>R650&#47;800, M800&#47;800, W660&#47;800</li>
                                                </ul>
                                            </li>
                                        </ul>
                                    </li>
                                    <li>
                                        <strong>How to pronounce "Joaquín" in Spanish:</strong>
                                        <ul>
                                            <li>Option 1: Become fluent in Spanish, then simply pronounce it without thinking about it too much.</li>
                                            <li>Option 2: Become a linguist, then say pronounce it /xo.a'kin/. As a linguist, you are well aware that the "x" is completely unrelated to the sound the letter X makes in English.</li>
                                            <li>Option 3: Become a nit-picky linguist, and pronounce it [xo̞.ä'kin]</li>
                                            <li>Option 3: Listen to native Spanish speakers from around the world pronouncing it on Forvo (<a target='_blank' href="http://forvo.com/search/Joaqu%C3%ADn/es/">http:&#47;&#47;forvo.com&#47;search&#47;Joaquín&#47;es&#47;</a>), and pronounce it the same way.</li>
                                            <li>Option 4: Listen to your favorite text-to-speech program or app with the language setting set to Spanish.</li>
                                            <li>Option 5: Pronounce it "haw-ah-KEEN", but be aware that this is only a rough approximation of the Spanish pronunciation.</li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div><!--#misc-->
                        <div style="height:100px"></div>
                    </div>
                </div>
            </div>
            

        

</script> <!-- page-template -->
